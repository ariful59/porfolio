bio: |
  I build machine learning systems that are practical in the real world and useful in research settings. My work spans wearable health technology, industrial analytics, interpretable machine learning, and data-intensive software systems, with recent focus on biomedical time-series modelling, multimodal learning, and deployable AI.

  I am currently completing a Master's in Applied Data Science at Malmö University while contributing to research on inherently interpretable deep learning for epileptic seizure prediction. Alongside research, I bring 6+ years of engineering experience from Samsung R&D and large-scale industrial software delivery.
