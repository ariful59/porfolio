{{ define "main" }}
<section class="mx-auto max-w-5xl px-6 py-10">
  <div class="prose prose-slate max-w-none lg:prose-xl dark:prose-invert">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
  </div>

  {{ if gt (len .Pages) 0 }}
  <div class="mt-10 grid gap-6 md:grid-cols-2">
    {{ range .Pages.ByDate.Reverse }}
    <article class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm transition hover:border-slate-300 dark:border-slate-700 dark:bg-slate-900/60 dark:hover:border-slate-500">
      <h2 class="text-2xl font-semibold text-slate-900 dark:text-slate-100">
        <a href="{{ .RelPermalink }}" class="hover:underline">{{ .Title }}</a>
      </h2>
      {{ with .Params.summary }}
      <p class="mt-3 text-slate-700 dark:text-slate-300">{{ . }}</p>
      {{ end }}
      <p class="mt-4">
        <a href="{{ .RelPermalink }}" class="text-sm font-medium text-slate-900 underline underline-offset-4 dark:text-slate-100">Read more</a>
      </p>
    </article>
    {{ end }}
  </div>
  {{ end }}
</section>
{{ end }}
