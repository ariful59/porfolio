{{ with site.Data.authors.admin.links }}
<nav aria-label="Social links" class="pointer-events-none fixed left-4 top-1/2 z-20 hidden -translate-y-1/2 xl:flex">
  <div class="pointer-events-auto flex flex-col items-center gap-3 rounded-full border border-slate-200 bg-white/88 px-2 py-3 shadow-lg backdrop-blur dark:border-slate-700 dark:bg-slate-900/88">
    {{ range . }}
    {{ $external := hasPrefix .url "http" }}
    <a
      href="{{ .url }}"
      class="group relative flex h-11 w-11 items-center justify-center rounded-full text-slate-600 transition duration-200 hover:-translate-y-0.5 hover:bg-slate-900 hover:text-white dark:text-slate-300 dark:hover:bg-slate-100 dark:hover:text-slate-900"
      aria-label="{{ .label }}"
      title="{{ .label }}"
      {{ if $external }}target="_blank" rel="noopener"{{ end }}>
      {{ partial "social-link-icon.html" . }}
      <span class="pointer-events-none absolute left-full ml-3 hidden whitespace-nowrap rounded-full bg-slate-900 px-3 py-1 text-xs font-semibold text-white shadow-lg group-hover:block dark:bg-slate-100 dark:text-slate-900">
        {{ .label }}
      </span>
    </a>
    {{ end }}
  </div>
</nav>
{{ end }}
